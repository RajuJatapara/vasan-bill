<script>
  // Safe Cache Refresh - LocalStorage Safe
  (function(){
      const v = Date.now();
  
      // Update favicon only
      document.querySelectorAll("link[rel='icon'], link[rel='apple-touch-icon']")
          .forEach(i => i.href = i.href.split("?")[0] + "?v=" + v);
  
      // First-load fresh refresh (session only)
      if(!sessionStorage.getItem("fresh-"+location.pathname)) {
          sessionStorage.setItem("fresh-"+location.pathname,"1");
          location.href = location.pathname + "?v=" + v;
      }
  })();

  z-index:1000;
  animation:slideUp 0.3s ease;

@keyframes slideUp{
  from{opacity:0;transform:translateX(-50%) translateY(20px);}

}

<script>
  document.getElementById("billDate").valueAsDate = new Date();
  let withAmount = true;

  // ---------------- Swipe Variables ----------------
  let touchStartX = 0;
  let touchStartY = 0;
  let touchEndX = 0;
  let touchEndY = 0;
  
  // ---------------- Touch Start ----------------
  document.addEventListener("touchstart", function(e) {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
  }, false);
  
  // ---------------- Touch End ----------------
  document.addEventListener("touchend", function(e) {
      touchEndX = e.changedTouches[0].screenX;
      touchEndY = e.changedTouches[0].screenY;
      handleSwipe();
  }, false);
  
  // ---------------- Swipe Handler ----------------
  function handleSwipe() {
      const swipeThreshold = 80;   // Min left swipe distance
      const verticalLimit = 50;    // Vertical scroll limit
  
      const diffX = touchStartX - touchEndX;
      const diffY = touchStartY - touchEndY;
  
      // ❌ If vertical movement is big => user is scrolling → ignore
      if (Math.abs(diffY) > verticalLimit) {
          return;
      }
  
      // ❌ If swipe distance is small → ignore
      if (Math.abs(diffX) < swipeThreshold) {
          return;
      }
  
      // 👉 Valid Left Swipe Detected
      if (diffX > 0) {
          if (window.location.pathname.includes("bill_create.html")) {
              if (confirm("શું તમે પાછળ જવા માંગો છો?")) {
                  window.location.href = "index.html";
              }
          }
      }
  }

function checkItemAmounts(){
  if(!withAmount)return;
  const totalInput=document.getElementById("totalInput");
  const totalValue=parseFloat(totalInput.value)||0;
  const itemAmounts=document.querySelectorAll(".item-amount");
  const rows=document.querySelectorAll("#itemTable tbody tr");
  
  let hasItemAmount=false;
  rows.forEach(r=>{
    const chk=r.querySelector('input[type="checkbox"]');
    if(chk && chk.checked){
      const amtInput=r.querySelector(".item-amount");
      if(amtInput && parseFloat(amtInput.value)>0){
        hasItemAmount=true;
      }
    }
  });
  
  if(totalValue>0 && !hasItemAmount){
    itemAmounts.forEach(inp=>{
      inp.disabled=true;
    });
    totalInput.disabled=false;
    totalInput.readOnly=false;
  }else if(hasItemAmount){
    itemAmounts.forEach(inp=>inp.disabled=false);
    totalInput.disabled=true;
    totalInput.readOnly=true;
    calculateTotalFromItems();
  }else{
    itemAmounts.forEach(inp=>inp.disabled=false);
    totalInput.disabled=false;
    totalInput.readOnly=false;
    totalInput.value="";
  }
  updateSelectedCount();
}

function calculateTotalFromItems(){
  if(!withAmount)return;
  const totalInput=document.getElementById("totalInput");
  if(totalInput.readOnly){
    const rows=document.querySelectorAll("#itemTable tbody tr");
    let total=0;
    rows.forEach(r=>{
      const chk=r.querySelector('input[type="checkbox"]');
      if(chk && chk.checked){
        const amtInput=r.querySelector(".item-amount");
        if(amtInput){
          total+=parseFloat(amtInput.value)||0;
        }
      }
    });
    totalInput.value=total>0?total:"";
  }
}

function updateRowNumbers(){
  const rows=document.querySelectorAll("#itemTable tbody tr");
  rows.forEach((row,index)=>{
    const firstCell=row.querySelector("td:first-child");
    if(firstCell && !firstCell.querySelector("input")){
      firstCell.textContent=index+1;
    }else if(!firstCell || firstCell.querySelector("input")){
      const serialCell=document.createElement("td");
      serialCell.style.textAlign="center";
      serialCell.style.fontWeight="600";
      serialCell.textContent=index+1;
      row.insertBefore(serialCell,row.firstChild);
    }else{
      firstCell.textContent=index+1;
    }
  });
}

function saveBillToHistory(lenar,mobile,denar,date,itemsList,total,withAmount){
  const editId = localStorage.getItem("editBillId");
  let history=JSON.parse(localStorage.getItem("vasanBillHistory")||"[]");

  if (editId) {
    const existingIndex = history.findIndex(b => b.id == editId);
    if (existingIndex !== -1) {
      history[existingIndex].lenar = lenar;
      history[existingIndex].mobile = mobile;
      history[existingIndex].denar = denar;
      history[existingIndex].date = date;
      history[existingIndex].items = itemsList;
      history[existingIndex].total = total;
      history[existingIndex].withAmount = withAmount;
      // status, paidAmount, timestamp remain the same
    }
    localStorage.removeItem("editBillId");
  } else {
    const billData={
      id:Date.now(),
      lenar:lenar,
      mobile:mobile,
      denar:denar,
      date:date,
      items:itemsList,
      total:total,
      withAmount:withAmount,
      status:"pending",
      paidAmount:0,
      timestamp:new Date().toISOString()
    };
    
    history.unshift(billData);
    if(history.length>100){
      history=history.slice(0,100);
    }
  }
  
  localStorage.setItem("vasanBillHistory",JSON.stringify(history));
}

  html2canvas(finalDiv, {
      scale: 3,
      backgroundColor: "#ffffff",
      useCORS: true,
      scrollY: -window.scrollY
  }).then(canvas => {
      finalDiv.setAttribute("style", oldStyle);
      
      const link = document.createElement("a");
      link.download = `Vasan_Bill_${lenar}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
      
      setTimeout(() => {
        waWindow.location.href = `https://api.whatsapp.com/send?phone=91${mobile}`;
      }, 500);

  }).catch(err => {
      finalDiv.setAttribute("style", oldStyle);
      console.error(err);
      waWindow.close();
      alert("ઇમેજ બનાવવામાં ભૂલ આવી.");
  });
}

function downloadImage() {
    const finalDiv = document.getElementById("finalBillView");

    const oldStyle = finalDiv.getAttribute("style") || "";

    finalDiv.style.transform = "none";
    finalDiv.style.zoom = "1";
    finalDiv.style.width = "520px";
    finalDiv.style.maxWidth = "520px";
    finalDiv.style.margin = "0 auto";
    finalDiv.style.boxShadow = "none";
    finalDiv.style.border = "2px solid #2b3d52";

    html2canvas(finalDiv, {
        scale: 3,
        backgroundColor: "#ffffff",
        useCORS: true,
        scrollY: -window.scrollY
    }).then(canvas => {
        const link = document.createElement("a");
        link.download = `Vasan_Bill_${Date.now()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();

        finalDiv.setAttribute("style", oldStyle);
    });
}

function initEditMode() {
  const editId = localStorage.getItem("editBillId");
  if (!editId) return;

  const history = JSON.parse(localStorage.getItem("vasanBillHistory") || "[]");
  const bill = history.find(b => b.id == editId);
  
  if (!bill) {
    localStorage.removeItem("editBillId");
    return;
  }

  document.getElementById("lenarName").value = bill.lenar || "";
  document.getElementById("lenarMobile").value = bill.mobile || "";
  document.getElementById("denarName").value = bill.denar || "ઉપલી ફળી મઢ";
  if (bill.date) {
    document.getElementById("billDate").value = bill.date;
  }

  const radioWith = document.querySelector('input[name="mode"][value="with"]');
  const radioWithout = document.querySelector('input[name="mode"][value="without"]');
  
  if (bill.withAmount) {
    radioWith.checked = true;
    toggleAmountMode(true);
  } else {
    radioWithout.checked = true;
    toggleAmountMode(false);
  }

  const totalInput = document.getElementById("totalInput");
  if (bill.total && bill.withAmount) {
     totalInput.value = parseFloat((bill.total || "").replace("₹", "")) || "";
  }

  const tempDiv = document.createElement("div");
  tempDiv.innerHTML = "<table><tbody>" + (bill.items || "") + "</tbody></table>";
  const rows = tempDiv.querySelectorAll("tr");
  const formRows = document.querySelectorAll("#itemTable tbody tr");
  
  rows.forEach(r => {
    const cells = r.querySelectorAll("td");
    if (cells.length >= 3) {
      const name = cells[1].textContent.trim();
      const qty = cells[2].textContent.trim();
      let amount = "";
      if (bill.withAmount && cells.length >= 4) {
         amount = cells[3].textContent.trim().replace("₹", "").trim();
         if(amount === "-") amount = "";
      }
      
      formRows.forEach(fr => {
        const rowName = fr.cells[2].textContent.trim();
        if (rowName === name) {
          const chk = fr.querySelector('input[type="checkbox"]');
          if (chk) chk.checked = true;
          
          const qtyInput = fr.cells[3].querySelector("input");
          if (qtyInput) qtyInput.value = qty;
          
          if (bill.withAmount) {
             const amtInput = fr.querySelector(".item-amount");
             if (amtInput && amount) amtInput.value = amount;
          }
        }
      });
    }
  });

  updateSelectedCount();
  checkItemAmounts();

  const generateBtn = document.querySelector("button[onclick='generateBill()']");
  if (generateBtn) {
     generateBtn.innerHTML = "🔄 બિલ અપડેટ કરો (Update)";
  }
}

// Call on load
window.addEventListener('DOMContentLoaded', initEditMode);

</script>
