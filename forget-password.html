<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પાસવર્ડ રીસેટ</title>
  <link rel="icon" href="images/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16.png">
  <link rel="icon" type="image/png" sizes="192x192" href="images/favicon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="images/favicon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">

  <!-- Prevent stale cache during development (optional) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <script>
    // Safe Cache Refresh - LocalStorage Safe
    (function(){
        const v = Date.now();
    
        // Update favicon only
        document.querySelectorAll("link[rel='icon'], link[rel='apple-touch-icon']")
            .forEach(i => i.href = i.href.split("?")[0] + "?v=" + v);
    
        // First-load fresh refresh (session only)
        if(!sessionStorage.getItem("fresh-"+location.pathname)) {
            sessionStorage.setItem("fresh-"+location.pathname,"1");
            location.href = location.pathname + "?v=" + v;
        }
    })();
    </script>
    
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:"Poppins",Arial,sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  /* Animated Gradient Background */
  background: linear-gradient(270deg, #667eea, #764ba2, #f093fb, #43e97b);
  background-size: 800% 800%;
  animation: gradientBG 12s ease infinite;
}

/* Gradient Animation */
@keyframes gradientBG{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Reset Box */
.box{
  background: rgba(255,255,255,0.95);
  padding:35px 25px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  box-shadow:0 25px 50px rgba(0,0,0,0.3);
  text-align:center;
  backdrop-filter: blur(10px);
  animation:fadeIn 1s ease forwards;
  position: relative;
}

/* FadeIn Animation */
@keyframes fadeIn{
  to{opacity:1;}
}

/* Heading & Icon */
.box h2{
  margin-bottom:20px;
  font-size:24px;
  color:#2b3d52;
}
.icon{
  font-size:60px;
  margin-bottom:15px;
  animation: bounce 2s infinite, colorPulse 4s infinite;
}

/* Color Pulse & Bounce */
@keyframes colorPulse{
  0%{color:#667eea;}
  25%{color:#764ba2;}
  50%{color:#f093fb;}
  75%{color:#43e97b;}
  100%{color:#667eea;}
}
@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
}

/* Inputs */
input{
  width:100%;
  padding:14px;
  margin:10px 0;
  border:2px solid #ddd;
  border-radius:12px;
  font-size:16px;
  transition: all 0.3s ease;
}
input:focus{
  outline:none;
  border-color:#667eea;
  box-shadow:0 0 10px rgba(102,126,234,0.4);
}

/* Button */
button{
  width:100%;
  padding:15px;
  margin-top:12px;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  border:none;
  border-radius:15px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition: all 0.3s ease;
  position:relative;
  overflow:hidden;
  box-shadow:0 6px 20px rgba(102,126,234,0.4);
}
button:hover{
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 10px 25px rgba(102,126,234,0.5);
}
button:active{
  transform:translateY(0) scale(0.98);
}
button::after{
  content:"";
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(255,255,255,0.15);
  transform: translateX(-100%);
  transition: transform 0.5s ease;
}
button:hover::after{
  transform: translateX(0);
}

/* Message */
.msg{
  color:red;
  margin-top:10px;
  min-height:20px;
  font-weight:600;
  font-size:14px;
  transition: all 0.3s ease;
}

/* Responsive */
@media(max-width:480px){
  .box{padding:25px 20px;}
  .icon{font-size:50px;}
  .box h2{font-size:22px;}
  input{padding:12px;}
  button{padding:12px;}
}
</style>
</head>
<body>

<div class="box">
  <div class="icon">🔑</div>
  <h2>પાસવર્ડ રીસેટ</h2>

  <input type="password" id="secret" placeholder="Admin Secret Password">
  <input type="password" id="new1" placeholder="નવો પાસવર્ડ">
  <input type="password" id="new2" placeholder="કન્ફર્મ પાસવર્ડ">

  <button onclick="resetPass()">પાસવર્ડ બદલાવો</button>

  <div class="msg" id="msg"></div>
</div>

<script>
const ADMIN_PASSWORD = "Admin@321"; // Logic unchanged

function resetPass(){
  const secret = document.getElementById("secret").value;
  const new1 = document.getElementById("new1").value;
  const new2 = document.getElementById("new2").value;
  const msg = document.getElementById("msg");

  if(secret !== ADMIN_PASSWORD){
    msg.style.color="red";
    msg.innerHTML="❌ ખોટો એડમિન સિક્રેટ પાસવર્ડ!";
    return;
  }
  if(new1.length < 4){
    msg.style.color="red";
    msg.innerHTML="પાસવર્ડ ઓછામાં ઓછું 4 અક્ષર હોવું જોઈએ!";
    return;
  }
  if(new1 !== new2){
    msg.style.color="red";
    msg.innerHTML="❌ પાસવર્ડ મેચ થતો નથી!";
    return;
  }

  localStorage.setItem("vasanBillPassword", new1);
  msg.style.color="green";
  msg.innerHTML="✔ પાસવર્ડ સફળતાપૂર્વક બદલાયો!";

  setTimeout(()=>{ window.location.href="lock.html"; },1500);
}
</script>

</body>
</html>
