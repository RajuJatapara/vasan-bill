<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2b3d52">
<meta name="apple-mobile-web-app-capable" content="yes">
<base href="./">
<title>પાસવર્ડ સેટ કરો</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:"Poppins",Arial,sans-serif;
  background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.setup-container{
  background:white;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  max-width:400px;
  width:100%;
  padding:40px 30px;
  text-align:center;
}
.setup-icon{
  font-size:60px;
  margin-bottom:20px;
}
h1{
  color:#2b3d52;
  font-size:24px;
  margin-bottom:10px;
  font-weight:700;
}
.subtitle{
  color:#666;
  font-size:14px;
  margin-bottom:30px;
}
.password-input{
  width:100%;
  padding:15px;
  border:2px solid #ddd;
  border-radius:10px;
  font-size:16px;
  margin-bottom:15px;
  text-align:center;
  letter-spacing:3px;
  font-weight:600;
}
.password-input:focus{
  outline:none;
  border-color:#667eea;
  box-shadow:0 0 10px rgba(102,126,234,0.3);
}
.setup-btn{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  border:none;
  padding:15px 30px;
  border-radius:10px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  width:100%;
  transition:transform 0.2s;
  box-shadow:0 4px 15px rgba(102,126,234,0.4);
}
.setup-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(102,126,234,0.5);
}
.error-msg{
  color:#dc3545;
  font-size:14px;
  margin-top:10px;
  display:none;
}
.error-msg.show{
  display:block;
}
.success-msg{
  color:#28a745;
  font-size:14px;
  margin-top:10px;
  display:none;
}
.success-msg.show{
  display:block;
}
@media (max-width:480px){
  .setup-container{padding:30px 20px;}
  h1{font-size:20px;}
}
</style>
</head>
<body>
<div class="setup-container">
  <div class="setup-icon">🔐</div>
  <h1>પાસવર્ડ સેટ કરો</h1>
  <div class="subtitle">સુરક્ષા માટે પાસવર્ડ બનાવો</div>
  
  <input type="password" id="newPassword" class="password-input" placeholder="નવું પાસવર્ડ" autocomplete="off">
  <input type="password" id="confirmPassword" class="password-input" placeholder="પાસવર્ડ કન્ફર્મ કરો" autocomplete="off">
  
  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>
  
  <button class="setup-btn" onclick="setPassword()">💾 પાસવર્ડ સેટ કરો</button>
</div>

<script>
const savedPassword=localStorage.getItem("vasanBillPassword");
if(savedPassword){
  window.location.href="lock.html";
}

const newPassword=document.getElementById("newPassword");
const confirmPassword=document.getElementById("confirmPassword");
const errorMsg=document.getElementById("errorMsg");
const successMsg=document.getElementById("successMsg");

function setPassword(){
  const newPass=newPassword.value;
  const confirmPass=confirmPassword.value;
  
  errorMsg.classList.remove("show");
  successMsg.classList.remove("show");
  
  if(!newPass || newPass.length<4){
    errorMsg.textContent="❌ પાસવર્ડ ઓછામાં ઓછા 4 અક્ષરનું હોવું જોઈએ!";
    errorMsg.classList.add("show");
    return;
  }
  
  if(newPass!==confirmPass){
    errorMsg.textContent="❌ પાસવર્ડ મેળ ખાતા નથી!";
    errorMsg.classList.add("show");
    return;
  }
  
  localStorage.setItem("vasanBillPassword",newPass);
  successMsg.textContent="✅ પાસવર્ડ સફળતાપૂર્વક સેટ થયો!";
  successMsg.classList.add("show");
  
  setTimeout(()=>{
    sessionStorage.setItem("vasanBillUnlocked","true");
    window.location.href="index.html";
  },1000);
}

confirmPassword.addEventListener("keypress",function(e){
  if(e.key==="Enter"){
    setPassword();
  }
});
</script>
</body>
</html>
